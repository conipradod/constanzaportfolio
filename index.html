<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C · P — Product Designer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page { overflow: hidden; }

    /* HERO */
    .hero {
      position: relative;
      height: calc(100vh - 72px);
      min-height: 600px;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url(./images/hero.png);
      background-size: cover;
      background-position: center;
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 10%, rgba(0,0,0,0.8) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 80px;
      height: 100%;
      max-width: 740px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }
    .hero-eyebrow {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.67);
      text-transform: uppercase;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 4.3vw, 62px);
      font-weight: 400;
      line-height: 1.15;
      color: #FFFFFF;
      max-width: 680px;
    }
    .hero-divider {
      width: 80px;
      height: 3px;
      background: #4A9FD8;
    }
    .hero-tags {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.53);
      max-width: 680px;
    }

    @media (max-width: 767px) {
      .hero-content { padding: 0 20px; }
    }
    @media (max-width: 1023px) {
      .hero-content { padding: 0 40px; }
    }
  </style>
</head>
<body class="page">

  <nav class="nav">
    <a href="index.html" class="nav-logo">C · P</a>
    <button class="nav-toggle" onclick="document.getElementById('nl').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nl">
      <a href="index.html" data-i18n="nav_home">home</a>
      <a href="work.html" data-i18n="nav_work">some work</a>
      <a href="about.html" data-i18n="nav_about">about me</a>
      <button class="lang-btn" id="lang-btn" onclick="toggleLang()">ES</button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <p class="hero-eyebrow" data-i18n="home_eyebrow">Product Designer &nbsp;·&nbsp; Santiago, Chile</p>
      <h1 class="hero-title" data-i18n="home_title">I craft innovative &amp; disruptive creations</h1>
      <div class="hero-divider"></div>
      <p class="hero-tags" data-i18n="home_tags">#ServiceDesign &nbsp;·&nbsp; #DataScience &nbsp;·&nbsp; #Automatization &nbsp;·&nbsp; #ChangeManagement</p>
    </div>
  </section>

  <script src="lang.js"></script>
</body>
</html>
